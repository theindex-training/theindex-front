<section class="page">
  <header class="page-header">
    <div>
      <h1>My profile</h1>
      <p>Review your subscriptions and training attendance.</p>
    </div>
  </header>

  @if (errorMessage && loading) {
    <div class="state error">{{ errorMessage }}</div>
  } @else {
    <div class="card">
      <div class="card-header">
        <div>
          <h2>Subscriptions</h2>
          <p>Track your current and past subscriptions.</p>
        </div>
        <label class="filter">
          <span>Filter</span>
          <select
            [value]="subscriptionFilter"
            (change)="subscriptionFilter = $any($event.target).value"
          >
            <option value="ACTIVE">Active</option>
            <option value="EXHAUSTED">Exhausted</option>
            <option value="ALL">All</option>
          </select>
        </label>
      </div>

      <app-trainee-subscriptions-table
        [subscriptions]="filteredSubscriptions"
        [plans]="plans"
        [loading]="subscriptionsLoading"
        [errorMessage]="subscriptionErrorMessage"
        [emptyMessage]="filteredSubscriptionsEmptyMessage"
        [showActionsColumn]="false"
      ></app-trainee-subscriptions-table>
    </div>

    <div class="card">
      <div class="card-header">
        <div>
          <h2>Trainings</h2>
          <p>Review your completed trainings.</p>
        </div>
      </div>

      <app-trainee-trainings-table
        [trainings]="trainings"
        [loading]="trainingsLoading"
        [errorMessage]="trainingErrorMessage"
        [emptyMessage]="'No trainings yet.'"
      ></app-trainee-trainings-table>
    </div>

  }
</section>
